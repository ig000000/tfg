<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Project Knowledge · Admin</title>

  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">

  <div class="header-top">
    <h1 class="logo" id="name">Project Knowledge · Teacher</h1>

    <div class="header-actions">
      <!-- Roles-->
      <select id="roleSwitcher"></select>

      <!-- Idioma -->
      <div class="tabs">
        <button class="tab" data-tag="ES">ES</button>
        <button class="tab" data-tag="EU">EU</button>
        <button class="tab" data-tag="EN">EN</button>
      </div>

      <!-- Logout -->
      <button onclick="changePassword()" class="login-btn">Cambiar contraseña</button>
      <button onclick="logout()" class="login-btn">Logout</button>
    </div>
  </div>

</header>

<!-- ================= CONTENIDO ================= -->
<main class="layout">

  <!-- Panel Admin -->
  <section class="articles">

    <h2 data-i18n="mnglessons"></h2>

    <h3 data-i18n="addEdit"></h3>

    <!-- Formulario -->
    <input type="hidden" id="articleId">

    <input id="title" data-i18n-placeholder="title">
    <br>
    <input id="author" data-i18n-placeholder="author">
    <br>
    <input id="date" data-i18n-placeholder="dateYMD">
    <br>

    <select id="lang">
      <option value="" data-i18n="slclanguage"></option>
      <option value="ES">Castellano (ES)</option>
      <option value="EU">Euskera (EU)</option>
      <option value="EN">English (EN)</option>
    </select>
    <br>
    <input id="tags" data-i18n-placeholder="tag">
    <br>
    <textarea id="summary" data-i18n-placeholder="summary" readonly></textarea>
    <br>
    <button type="button" id="linkLessonBtn" data-i18n="linlkesson"></button>
    <br>
    <div id="editor" style="height:300px;"></div>

    <div class="admin-actions">
      <button id="saveBtn" data-i18n="save"></button>
      <button id="clearBtn" data-i18n="clear"></button>
    </div>

    <hr>

    <!-- Buscar lecciones -->
    <h3 data-i18n="sasl"></h3>

    <div class="admin-search">
      <label data-i18n="language"></label>
      <select id="adminLangFilter">
        <option value="" data-i18n="all"></option>
        <option value="ES">ES</option>
        <option value="EU">EU</option>
        <option value="EN">EN</option>
      </select>

      <input id="adminSearchInput" data-i18n-placeholder="srchLessons">
      <button id="adminSearchBtn" data-i18n="serch"></button>
    </div>

    <h4 data-i18n="results"></h4>
    <div id="adminArticlesList"></div>
    
    <!--Paginación-->
    <div id="paginationControls">
      <button id="prevBtn">⬅️ Anterior</button>
      <span id="pageInfo"></span>
      <button id="nextBtn">Siguiente ➡️</button>
    </div>

  </section>

  <hr>

<!-- ================= POSIBLES LECCIONES ================= -->
<section class="admin-ideas">

  <h2 data-i18n="btnIdeas"></h2>

  <h3 data-i18n="addNewIdea"></h3>

  <input id="ideaTitle" data-i18n-placeholder="title">
  <textarea id="ideaDescription" rows="4" data-i18n-placeholder="descIdea"></textarea>
  <!--<input id="ideaAuthor" data-i18n-placeholder="author">
  <input id="ideaTags" data-i18n-placeholder="tag">-->
  <button id="addIdeaBtn" data-i18n="addIdea"></button>

  <hr>

  <h3 data-i18n="existIdeas"></h3>
  <div id="adminIdeasList"></div>

</section>


</main>

<!-- ================= SCRIPTS ================= -->
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script src="js/lang.js"></script>
<script src="js/main2.js"></script>
<script src="js/teacher.js"></script>
<script src="js/roles.js"></script>

<script>
async function checkSession(){
  const res = await fetch("/auth/check");

  if(res.status !== 200){
    window.location.href = "login.html";
    return;
  }

  const data = await res.json();

  if(data.activeRole !== "teacher"){
    alert("No autorizado");
    window.location.href = "index.html";
  }
}
checkSession();

//Logout
window.logout = async function () {
  await fetch("/auth/logout", {
     method: "POST",
     credentials: "include"});
  window.location.href = "login.html";
};

//cambiar contraseña
window.changePassword = function() {
   window.location.href = "change-passwordAll.html";
}
</script>

</body>
</html>
