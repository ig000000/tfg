<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Project Knowledge</title>
  <link rel="stylesheet" href="css/styles.css">
  <link id="favicon" rel="icon" href="">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">

  <div class="header-top">

    <div class="header-actions">
      <!-- Idioma -->
      <div class="tabs">
        <button class="tab" data-tag="ES">ES</button>
        <button class="tab" data-tag="EU">EU</button>
        <button class="tab" data-tag="EN">EN</button>
      </div>

      <!-- Login -->
      <a href="/login.html" class="login-btn">Login</a>
    </div>
  </div>

  <!--
  <img id="logoimg" href=""/>
  <h1 class="logo" id="jjjj"></h1>-->

  <!-- ================= LOGO SECTION ================= -->
  <section class="logo-section">
    <div class="logo-container">
      <img id="logoimg" src="" alt="Logo">
      <h2 id="name">Project Knowledge</h2>
    </div>
  </section>

  <!-- Navegación -->
  <nav class="nav-links">
    <a href="lesson-index.html" data-i18n="lessonsIndex"></a>
    <a href="contribution.html" data-i18n="contribution"></a>
    <a href="license.html" data-i18n="license"></a>
    <a href="ideas.html" data-i18n="btnIdeas"></a>
  </nav>

</header>

<!-- ================= CONTROLES ================= -->
<section class="controls">

  <!-- Buscador -->
  <div class="search-box">
    <input 
      id="searchInput"
      type="text"
      data-i18n-placeholder="srchLessons">
    <button id="searchButton" data-i18n="serch"></button>
  </div>

  <!-- Ordenación -->
  <div class="sort-box">
    <label data-i18n="sortBy"></label>

    <select id="sortField">
      <option value="date" data-i18n="date"></option>
      <option value="title" data-i18n="title"></option>
    </select>

    <select id="sortOrder">
      <option value="asc" data-i18n="asc"></option>
      <option value="desc" data-i18n="desc"></option>
    </select>

    <button id="sortBtn" data-i18n="sort"></button>
  </div>

</section>

<!-- ================= CONTENIDO ================= -->
<main class="layout">

  <!-- Lecciones -->
  <section class="lessons-section">
    <div id="articles"></div>
    <br>
    <div id="pagination"></div>
  </section>

  <!-- Links of Interest -->
  <aside class="links-of-interest">
    <h3 id="VisibleLinks" data-i18n="linksOfInterest"></h3>
    <lu><div id="links"></div></lu>

  </aside>

</main>

<!-- ================= SCRIPTS ================= -->
<script src="js/lang.js"></script>
<script src="js/main.js"></script>
<script src="js/linksOfInterest.js"></script>
<script src="js/loadimg.js"></script>
<script>
  loadPublicLinks();
</script>
 
  

</body>
</html>
