<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Project Knowledge · Admin</title>

  <link rel="stylesheet" href="css/styles.css">
  <!--Quill-->
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
  <link id="favicon" rel="icon" href="">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">

  <div class="header-top">
    <h1 class="logo" id="name">Project Knowledge · Admin</h1>

    <div class="header-actions">
    <!-- Roles-->
      <select id="roleSwitcher"></select>

      <!-- Idioma -->
      <div class="tabs">
        <button class="tab" data-tag="ES">ES</button>
        <button class="tab" data-tag="EU">EU</button>
        <button class="tab" data-tag="EN">EN</button>
      </div>

      <!-- Logout -->
       <button onclick="changePassword()" class="login-btn" data-i18n="changePassword">Cambiar contraseña</button>
      <button onclick="logout()" class="login-btn">Logout</button>
    </div>
  </div>
</header>

<!-- ================= CONTENIDO ================= -->
<h2>ADMIN</h2>

</main>
<!-- Filtros -->
  <section class="filters">
    <input type="text" id="searchUser" data-i18n-placeholder="userSearch">

    <select id="filterRole">
      <option value="" data-i18n="all">Todos</option>
      <option value="teacher" data-i18n="teacher">profesor</option>
      <option value="admin" data-i18n="admin">Admin</option>
    </select>
  </section>

  <!-- Crear usuario -->
  <section class="create-user">
    <h2 data-i18n="createUser">Crear Usuario</h2>

    <input type="text" id="newUsername" data-i18n-placeholder="userNamel">

    <!--
    <label>
      <input type="checkbox" id="roleProfesor" data-i18n="teacher"> Profesor
    </label>

    <label>
      <input type="checkbox" id="roleAdmin"> Admin
    </label>-->
    <label>
      <input type="checkbox" id="roleProfesor">
      <span data-i18n="teacher">Profesor</span>
    </label>

    <label>
      <input type="checkbox" id="roleAdmin">
      <span data-i18n="admin">Admin</span>
    </label>

    <button onclick="createUser()" data-i18n="createUserl" class="login-btn">Crear</button>
  </section>

  <!-- Lista de usuarios -->
  <section>
    <h2 data-i18n="usernames">Usuarios</h2>

    <table>
      <thead>
        <tr>

          <th data-i18n="roles">Roles</th>
          <th data-i18n="acctions">Acciones</th>
        </tr>
      </thead>

      <tbody id="usersTable">
      </tbody>
    </table>
  </section>

  <!-- papelera usuarios-->
  <section id="trash-section">
    <h2 data-i18n="userTrash">🗑️ Papelera de usuarios</h2>

    <div class="trash-controls">
      <button onclick="loadDeletedUsers()" data-i18n="refresh">🔄 Recargar</button>
    </div>

    <table class="trash-table">
      <thead>
        <tr>
          <th data-i18n="username">Usuario</th>
          <th data-i18n="rolAdmin">Rol</th>
          <th data-i18n="dataEliminated">Fecha eliminación</th>
          <th data-i18n="acctions">Acciones</th>
        </tr>
      </thead>
      <tbody id="deletedUsersTable">
        <!-- Aquí se insertan los usuarios -->
      </tbody>
    </table>

    <p id="noDeletedUsers" style="display:none;" data-i18n="noUsersTrash">
      No hay usuarios en la papelera.
    </p>
  </section>

  <!--Edición licencia / contribución-->
<section class="admin-section" id="contentSection">
  <h2 data-i18n="editLicencia">Editar Licencia</h2>

<div id="editorLicencia"></div>
<button onclick="saveLicencia()" data-i18n="saveLicencia" class="login-btn">Guardar Licencia</button>

<h2 data-i18n="editContribution">Editar Contribución</h2>

      <option value="EN">English (EN)</option>

<div id="editorContribucion"></div>
<button onclick="saveContribucion()" data-i18n="saveContribution" class="login-btn">Guardar Contribución</button>
</section>

<!--================Configuración Global=================-->
<section class="admin-section" id="settingsSection">

<section class="settings">

  <input type="text" id="siteName">
  <br>
  <label data-i18n="defaultLanguage">Idioma por defecto</label>
  <select id="defaultLang">
    <option value="ES">ES</option>
    <option value="EU">EU</option>
    <option value="EN">EN</option>
  </select>
  <br>

  <label data-i18n="paginator">Artículos por página</label>
  <input type="number" id="articlesPerPage">
  <br>
  <button onclick="saveSettings()" data-i18n="saveSettings" class="login-btn">Guardar Configuración</button>
  <br>

  <h3 data-i18n="logo">Logo</h3>

  <input type="file" id="logoFile">
  <button onclick="uploadLogo()" data-i18n="saveLogo" class="login-btn">Subir Logo</button>

  <h3 data-i18n="Favicon">Favicon</h3>

  <input type="file" id="faviconFile">
  <button onclick="uploadFavicon()" data-i18n="savefavicon" class="login-btn">Subir Favicon</button>
  <!-- guardar -->
  <br>

  
  <h3 data-i18n="linksOfInterest">Links of Interest</h3>

  <div id="linksContainer"></div>

 </br>

  <button onclick="addLink()" data-i18n="addLink" class="login-btn">Añadir link</button>
  <button onclick="saveLinks()" data-i18n="saveLinks" class="login-btn">Guardar Links</button>

</section>
</section>
<br>

<!-- Buscar lecciones -->
  <section class="admin-section" id="lessonsSection">
    <h3 data-i18n="sasl"></h3>

    <div class="admin-search">
      <label data-i18n="language"></label>
      <select id="adminLangFilter">
        <option value="" data-i18n="all"></option>
        <option value="ES">ES</option>
        <option value="EU">EU</option>
        <option value="EN">EN</option>
      </select>

      <input id="adminSearchInput" data-i18n-placeholder="srchLessons">
      <button id="adminSearchBtn" data-i18n="serch" class="login-btn"></button>
    </div>

    <h4 data-i18n="results"></h4>
    <div id="adminArticlesList"></div>

    <!--Paginación-->
    <div id="paginationControls">
      <button id="prevBtn" data-i18n="previousP">⬅️ Anterior</button>
      <span id="pageInfo"></span>
      <button id="nextBtn" data-i18n="neextP">Siguiente ➡️</button>
    </div>
</section>

<!-- backup -->
 <section class="admin-section" id="backup">
    <button id="create-backup-btn" class="login-btn" data-i18n="backup">
      Descargar copia de seguridad
    </button>
 </section>

<script>
async function checkSession(){
  const res = await fetch("/auth/check");

  if(res.status !== 200){
    window.location.href = "login.html";
    return;
  }

  const data = await res.json();

  if(data.activeRole !== "admin"){
    alert("No autorizado");
    window.location.href = "index.html";
  }
}
checkSession();

//Logout
window.logout = async function () {
  await fetch("/auth/logout", { 
    method: "POST",
    credentials: "include"});
  window.location.href = "login.html";
};

//cambiar contraseña
window.changePassword = function() {
   window.location.href = "change-passwordAll.html";
}

loadLinks();
</script>

</html>
