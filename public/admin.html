<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Project Knowledge · Admin</title>

  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">

  <div class="header-top">
    <h1 class="logo">Project Knowledge · Admin</h1>

    <div class="header-actions">
    <!-- Roles-->
      <select id="roleSwitcher"></select>

      <!-- Idioma -->
      <div class="tabs">
        <button class="tab" data-tag="ES">ES</button>
        <button class="tab" data-tag="EU">EU</button>
        <button class="tab" data-tag="EN">EN</button>
      </div>

      <!-- Logout -->
      <button onclick="logout()" class="login-btn">Logout</button>
    </div>
  </div>

</header>

<!-- ================= CONTENIDO ================= -->

<h2>ADMIN</h2>

</main>
<!-- 🔍 Filtros -->
  <section class="filters">
    <input type="text" id="searchUser" placeholder="Buscar usuario...">

    <select id="filterRole">
      <option value="">Todos</option>
      <option value="teacher">profesor</option>
      <option value="admin">Admin</option>
    </select>
  </section>

  <!-- ➕ Crear usuario -->
  <section class="create-user">
    <h2>Crear Usuario</h2>

    <input type="text" id="newUsername" placeholder="Nombre">
    <input type="password" id="newPassword" placeholder="Contraseña">

    <label>
      <input type="checkbox" id="roleProfesor"> Profesor
    </label>

    <label>
      <input type="checkbox" id="roleAdmin"> Admin
    </label>

    <button onclick="createUser()">Crear</button>
  </section>

  <!-- 📋 Lista de usuarios -->
  <section>
    <h2>Usuarios</h2>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Roles</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="usersTable">
        <!-- Se rellena con JS -->
      </tbody>
    </table>
  </section>

  
<!-- ================= SCRIPTS ================= -->
<!--<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>-->
<script src="js/lang.js"></script>
<script src="js/auth.js"></script>
<script src="js/roles.js"></script>
<script src="js/admin.js"></script>
<script src="js/main2.js"></script>

<script>
async function checkSession(){
  const res = await fetch("/auth/check");

  if(res.status !== 200){
    window.location.href = "login.html";
    return;
  }

  const data = await res.json();

  if(data.activeRole !== "admin"){
    alert("No autorizado");
    window.location.href = "index.html";
  }
}
checkSession();

//Logout
window.logout = async function () {
  await fetch("/auth/logout", { method: "POST" });
  window.location.href = "login.html";
};
</script>

</body>
</html>
