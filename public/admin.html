<!DOCTYPE html>
<html lang="es">

<body>

<!-- ================= HEADER ================= -->
<header class="header">

    <h1 class="logo">Project Knowledge · Admin</h1>

<!-- ================= CONTENIDO ================= -->

<h2>ADMIN</h2>

</main>
<!-- 🔍 Filtros -->
  <section class="filters">
    <input type="text" id="searchUser" placeholder="Buscar usuario...">

    <select id="filterRole">
      <option value="">Todos</option>
      <option value="teacher">profesor</option>
      <option value="admin">Admin</option>
    </select>
  </section>

  <!-- ➕ Crear usuario -->
  <section class="create-user">
    <h2>Crear Usuario</h2>

    <input type="text" id="newUsername" placeholder="Nombre">
    <!--<input type="password" id="newPassword" placeholder="Contraseña">-->
    <input type="text" id="newUserNumber" placeholder="Número de usuario">

    <label>
      <input type="checkbox" id="roleProfesor"> Profesor
    </label>

    <label>
      <input type="checkbox" id="roleAdmin"> Admin
    </label>

    <button onclick="createUser()">Crear</button>
  </section>

  <!-- 📋 Lista de usuarios -->
  <section>
    <h2>Usuarios</h2>

    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Roles</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>

      <tbody id="usersTable">
        <!-- Se rellena con JS -->
      </tbody>
    </table>
  </section>

  <!-- papelera usuarios-->
  <section id="trash-section">
    <h2>🗑️ Papelera de usuarios</h2>

    <div class="trash-controls">
      <button onclick="loadDeletedUsers()">🔄 Recargar</button>
    </div>

    <table class="trash-table">
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Rol</th>
          <th>Fecha eliminación</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="deletedUsersTable">
        <!-- Aquí se insertan los usuarios -->
      </tbody>
    </table>

    <p id="noDeletedUsers" style="display:none;">
      No hay usuarios en la papelera.
    </p>
  </section>

  <!--Edición licencia / contribución-->
  <h2>Editar Licencia</h2>
<div id="editorLicencia"></div>
<button onclick="saveLicencia()">Guardar Licencia</button>

<h2>Editar Contribución</h2>
<div id="editorContribucion"></div>
<button onclick="saveContribucion()">Guardar Contribución</button>

<!--================Configuración Global=================-->
<h2>Configuración Global</h2>

<section class="settings">

  <label>Nombre del sitio</label>
  <input type="text" id="siteName">
  <br>
  <label>Idioma por defecto</label>
  <select id="defaultLang">
    <option value="ES">ES</option>
    <option value="EU">EU</option>

  <label>Artículos por página</label>

  <br>
  <button onclick="saveSettings()">Guardar Configuración</button>
  <br>

  <label>Logo (URL)</label>
  <input type="text" id="logo">
  <br>
  <label>Favicon (URL)</label>
  <input type="text" id="favicon">-->

  <h3>Favicon</h3>

  <input type="file" id="faviconFile">
  <button onclick="uploadFavicon()">Subir Favicon</button>
  <!-- guardar -->
  <br>

  
  <h3>Links of Interest</h3>

  <div id="linksContainer"></div>

  <button onclick="addLink()">Añadir link</button>
  <button onclick="saveLinks()">Guardar Links</button>

</section>
<br>

        <option value="ES">ES</option>
        <option value="EU">EU</option>
        <option value="EN">EN</option>
      </select>

      <input id="adminSearchInput" data-i18n-placeholder="srchLessons">

<script>
async function checkSession(){
  const res = await fetch("/auth/check");

  if(res.status !== 200){
    window.location.href = "login.html";
    return;
  }

  const data = await res.json();

  if(data.activeRole !== "admin"){
    alert("No autorizado");
    window.location.href = "index.html";
  }
}
checkSession();

//Logout
window.logout = async function () {
  await fetch("/auth/logout", { 
    method: "POST",
    credentials: "include"});
  window.location.href = "login.html";
};

//cambiar contraseña
window.changePassword = function() {
   window.location.href = "change-passwordAll.html";
}

loadLinks();
</script>

</body>
</html>
