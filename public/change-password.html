<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Project Knowledge · Change Password</title>
  <link rel="stylesheet" href="css/styles.css">
  <link id="favicon" rel="icon" href="">
</head>
<body>
  <!--tags-->
    <header class="header">

  <div class="header-top">

    <div class="header-actions">
      <!-- Idioma -->
      <div class="tabs">
        <button class="tab" data-tag="ES">ES</button>
        <button class="tab" data-tag="EU">EU</button>
        <button class="tab" data-tag="EN">EN</button>
      </div>
    </div>
  </div>
</header>

<!--CONTENIDO-->
  <div class="center-page">
    <h2 data-i18n="changePassword">Cambiar contraseña</h2>

    <input type="password" id="newPassword" data-i18n-placeholder="passwdNwePasswd">
    <input type="password" id="repeatPassword" data-i18n-placeholder="passwdRepeat">

    <button class="login-btn" onclick="changePassword()" data-i18n="changePassword">Cambiar contraseña</button>

    <p id="msg" style="color:red"></p>
  </div>
    <script src="/js/changePassword.js"></script>
    <script src="js/favicom.js"></script>
    <script src="js/main2.js"></script>
    <script src="js/lang.js"></script>
    <script>
      async function checkSession(){
        const res = await fetch("/auth/check");

        if(res.status !== 200){
          window.location.href = "login.html";
          return;
        }
      }
      checkSession();
    </script>
</body>
</html>
