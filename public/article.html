<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Project Knowledge · Article</title>

  <link rel="stylesheet" href="css/styles.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link id="favicon" rel="icon" href="">
</head>
<body>

<!-- ================= HEADER ================= -->
<header class="header">

  <div class="header-top">
    <div class="header-actions">
      <!-- Idioma -->
      <div class="tabs">
        <button class="tab" data-tag="ES">ES</button>
        <button class="tab" data-tag="EU">EU</button>
        <button class="tab" data-tag="EN">EN</button>
      </div>

      <!-- Login -->
      <a href="/login.html" class="login-btn">Login</a>
    </div>
  </div>

    <!-- ================= LOGO SECTION ================= -->
  <section class="logo-section">
    <div class="logo-container">
      <img id="logoimg" src="" alt="Logo">
      <h2 id="name">Project Knowledge</h2>
    </div>
  </section>

  <!-- Navegación -->
  <nav class="nav-links">
    <a href="index.html" data-i18n="home"></a>
    <a href="lesson-index.html" data-i18n="lessonsIndex"></a>
    <a href="contribution.html" data-i18n="contribution"></a>
    <a href="license.html" data-i18n="license"></a>
  </nav>

</header>

<!-- ================= CONTENIDO ================= -->
<main class="layout">

  <!-- Artículo -->
  <article class="articles">

    <!-- Aquí se carga el artículo -->
    <div id="content" class="article-content"></div>

    <hr>

    <!-- ================= COMENTARIOS ================= -->
    <section class="comments-section">

      <h2 data-i18n="commentsTitle"></h2>

      <div id="comments" class="comments-list"></div>

      <h3 data-i18n="addComment"></h3>

      <div class="comment-form">
        <input id="nameComment" type="text" data-i18n-placeholder="yourName">

        <textarea id="comment" rows="4" data-i18n-placeholder="writeComment"></textarea>

        <button id="sendComment" class="primary-btn" data-i18n="send">
        </button>
      </div>

    </section>

  </article>

  <!-- Sidebar -->
   <!-- Links of Interest -->
  <aside class="links-of-interest">
    <h3 id="VisibleLinks" data-i18n="linksOfInterest"></h3>
    <lu><div id="links"></div></lu>

  </aside>

</main>

<!-- ================= SCRIPTS ================= -->
<script src="js/lang.js"></script>
<script src="js/article.js"></script>
<script src="js/main2.js"></script>
<script src="js/favicom.js"></script>
<script src="js/linksOfInterest.js"></script>
<script src="js/loadimg.js"></script>
<script>loadPublicLinks();</script>
</body>
</html>
